<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影院场次监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f4f6f8;color:#1f2937}
header{background:linear-gradient(135deg,#111827,#1f2937);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:20px;color:#fff;font-weight:700}
header h1 span{color:#fca5a5}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select,button,textarea{font:inherit}
input[type="date"],input[type="text"],input[type="password"],input[type="number"],select,textarea{background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px}
button{border:none;border-radius:8px;padding:8px 14px;background:#ef4444;color:#fff;cursor:pointer;transition:background .2s ease,transform .2s ease}
button:hover{background:#dc2626;transform:translateY(-1px)}
button:disabled{opacity:.65;cursor:not-allowed;transform:none}
.secondary-btn{background:#334155}
.secondary-btn:hover{background:#1e293b}
.status{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 24px;background:#1f2937;color:#d1d5db;font-size:13px}
.status strong{color:#fff}
.status span:last-child{color:#86efac}
main{padding:18px 24px}
.table-wrap{background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(15,23,42,.08);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc}
th,td{padding:11px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid #edf2f7;vertical-align:top}
th{position:sticky;top:0;z-index:2;color:#475569;font-weight:700;cursor:pointer;user-select:none}
th:hover{background:#eef2ff}
th[data-sort]::after{content:" \2195";opacity:.35;font-size:11px}
th[data-sort="asc"]::after{content:" \2191";opacity:1}
th[data-sort="desc"]::after{content:" \2193";opacity:1}
tbody tr{transition:background .2s ease}
tbody tr:hover{background:#fff1f2;cursor:pointer}
tbody tr.good td{background:#ecfdf5}
tbody tr.warn td{background:#fffbeb}
tbody tr.full td{background:#fef2f2}
tbody tr.good:hover td{background:#dcfce7}
tbody tr.warn:hover td{background:#fef3c7}
tbody tr.full:hover td{background:#fee2e2}
.name{font-weight:600;color:#111827}
.movie-cell{min-width:280px}
.movie-title{font-weight:700;color:#111827;line-height:1.4}
.movie-meta{margin-top:4px;font-size:12px;color:#64748b;line-height:1.5}
.time{font-weight:700;color:#111827}
.time-meta{display:block;margin-top:4px;font-size:12px;color:#64748b}
.hall{font-size:12px;color:#64748b}
.price{font-weight:700;color:#dc2626}
.seat-bar{display:inline-flex;align-items:center;width:100px;height:12px;border-radius:999px;background:#e5e7eb;overflow:hidden;vertical-align:middle;margin-right:8px}
.seat-bar-fill{height:100%}
.loading,.empty-state{padding:52px 16px;text-align:center;color:#94a3b8}
.error-msg{color:#dc2626}
.muted{color:#94a3b8;font-size:12px}
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.68);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal.show{display:flex}
.modal-box{width:min(960px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 20px 40px rgba(15,23,42,.24);padding:24px}
.modal-box.narrow{width:min(520px,100%)}
.modal-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.modal-header h2{font-size:18px;color:#111827}
.modal-close{background:transparent;color:#64748b;padding:0;font-size:22px;line-height:1}
.modal-close:hover{background:transparent;color:#111827;transform:none}
.seat-map,.ai-result{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:16px;overflow:auto;font-family:"Consolas","Courier New",monospace;font-size:13px;line-height:1.6;white-space:pre-wrap}
.legend{margin-top:12px;font-size:12px;color:#64748b}
.legend span{margin-right:16px}
.analysis-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.analysis-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center}
.analysis-card .num{font-size:28px;font-weight:700;color:#dc2626}
.analysis-card .label{font-size:12px;color:#64748b}
.analysis-section{margin-top:18px}
.analysis-section h3{font-size:15px;margin-bottom:10px;color:#111827}
.analysis-table{width:100%;border-collapse:collapse;font-size:12px}
.analysis-table th,.analysis-table td{padding:8px 10px;border-bottom:1px solid #e5e7eb}
.analysis-table th{background:#f8fafc;color:#475569}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1 / -1}
.form-label{display:grid;gap:6px;font-size:13px;color:#334155}
.helper{font-size:12px;color:#64748b;line-height:1.5}
a{color:#dc2626}
@media (max-width:900px){
  .analysis-grid,.form-grid{grid-template-columns:1fr}
}
@media (max-width:640px){
  body{background:#fff}
  header,.status,main{padding-left:14px;padding-right:14px}
  .controls{width:100%}
  .controls > *{flex:1 1 calc(50% - 8px);min-width:140px}
}
</style>
</head>
<body>
<header>
  <h1>影院场次监控 <span>| AI 排片建议</span></h1>
  <div class="controls">
    <input type="date" id="dateFilter">
    <select id="cinemaFilter"><option value="">全部影院</option></select>
    <select id="movieFilter"><option value="">全部电影</option></select>
    <select id="hallFilter"><option value="">全部影厅</option></select>
    <button id="refreshBtn" type="button">刷新数据</button>
    <button id="analysisBtn" type="button">分析报告</button>
    <button id="aiSuggestBtn" type="button">AI排片建议</button>
    <button id="llmConfigBtn" type="button" class="secondary-btn">模型设置</button>
    <button id="loginBtn" type="button" class="secondary-btn">登录猫眼</button>
    <span id="loginStatus" style="display:none;font-size:12px;color:#86efac"></span>
  </div>
</header>

<div class="status">
  <span>共 <strong id="totalShows">0</strong> 场 / <strong id="totalCinemas">0</strong> 家影院</span>
  <span id="lastUpdate">等待查询</span>
</div>

<main>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-key="cinemaName" data-sort="">影院</th>
          <th data-key="movieName" data-sort="asc">场次信息</th>
          <th data-key="time" data-sort="">时间</th>
          <th data-key="hall" data-sort="">影厅/语言</th>
          <th data-key="price" data-sort="">票价</th>
          <th data-key="rate" data-sort="">座位情况</th>
        </tr>
      </thead>
      <tbody id="showsBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">暂无数据</div>
  </div>
</main>

<div class="modal" id="seatMapModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">座位图</h2>
      <button class="modal-close" type="button" data-close="seatMapModal">&times;</button>
    </div>
    <div id="seatMapContent"></div>
    <div class="legend">
      <span>□ 可售</span>
      <span>■ 已售</span>
      <span>● 特殊座</span>
    </div>
  </div>
</div>

<div class="modal" id="loginModal">
  <div class="modal-box narrow">
    <div class="modal-header">
      <h2>登录猫眼账号</h2>
      <button class="modal-close" type="button" data-close="loginModal">&times;</button>
    </div>
    <p class="helper">
      在手机猫眼 App 中获取 Token 后粘贴到下面。<br>
      <a href="https://m.maoyan.com/mtrade/openclaw/token" target="_blank" rel="noreferrer">打开 Token 页面</a>
    </p>
    <textarea id="authTokenInput" rows="4" placeholder="粘贴 Token"></textarea>
    <div id="loginError" style="display:none;margin-top:8px;font-size:12px;color:#dc2626"></div>
    <button id="doLoginBtn" type="button" style="margin-top:14px;width:100%">确认登录</button>
  </div>
</div>

<div class="modal" id="analysisModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>数据分析报告</h2>
      <button class="modal-close" type="button" data-close="analysisModal">&times;</button>
    </div>
    <div id="analysisContent"></div>
  </div>
</div>

<div class="modal" id="llmConfigModal">
  <div class="modal-box narrow">
    <div class="modal-header">
      <h2>模型设置</h2>
      <button class="modal-close" type="button" data-close="llmConfigModal">&times;</button>
    </div>
    <div class="form-grid">
      <label class="form-label full">Base URL
        <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1">
      </label>
      <label class="form-label">Model
        <input type="text" id="llmModel" placeholder="gpt-4.1-mini">
      </label>
      <label class="form-label">Temperature
        <input type="number" id="llmTemperature" min="0" max="2" step="0.1">
      </label>
      <label class="form-label">Max Tokens
        <input type="number" id="llmMaxTokens" min="200" max="4000" step="100">
      </label>
      <label class="form-label full">API Key
        <input type="password" id="llmApiKey" placeholder="sk-...">
      </label>
      <label class="form-label full">System Prompt
        <textarea id="llmSystemPrompt" rows="6"></textarea>
      </label>
    </div>
    <p class="helper" style="margin-top:12px">
      支持 OpenAI 兼容接口。用于基于当前筛选结果分析场次合理性，并输出排片优化建议。
    </p>
    <div id="llmConfigError" style="display:none;margin-top:10px;font-size:12px;color:#dc2626"></div>
    <button id="saveLlmConfigBtn" type="button" style="margin-top:14px;width:100%">保存模型配置</button>
  </div>
</div>

<div class="modal" id="aiResultModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>AI 排片建议</h2>
      <button class="modal-close" type="button" data-close="aiResultModal">&times;</button>
    </div>
    <div id="aiResultContent" class="ai-result">等待分析...</div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cinema_shows_data';
const SEAT_REQUEST_BATCH = 20;

const state = {
  config: { cinemas: [] },
  llmConfig: null,
  allData: [],
  seatCountCache: {},
  loadingSeatCounts: false,
  sort: { key: 'movieName', dir: 'asc' }
};

const refs = {
  dateFilter: document.getElementById('dateFilter'),
  cinemaFilter: document.getElementById('cinemaFilter'),
  movieFilter: document.getElementById('movieFilter'),
  hallFilter: document.getElementById('hallFilter'),
  refreshBtn: document.getElementById('refreshBtn'),
  analysisBtn: document.getElementById('analysisBtn'),
  aiSuggestBtn: document.getElementById('aiSuggestBtn'),
  llmConfigBtn: document.getElementById('llmConfigBtn'),
  loginBtn: document.getElementById('loginBtn'),
  loginStatus: document.getElementById('loginStatus'),
  totalShows: document.getElementById('totalShows'),
  totalCinemas: document.getElementById('totalCinemas'),
  lastUpdate: document.getElementById('lastUpdate'),
  showsBody: document.getElementById('showsBody'),
  emptyState: document.getElementById('emptyState'),
  seatMapModal: document.getElementById('seatMapModal'),
  seatMapContent: document.getElementById('seatMapContent'),
  modalTitle: document.getElementById('modalTitle'),
  loginModal: document.getElementById('loginModal'),
  authTokenInput: document.getElementById('authTokenInput'),
  loginError: document.getElementById('loginError'),
  doLoginBtn: document.getElementById('doLoginBtn'),
  analysisModal: document.getElementById('analysisModal'),
  analysisContent: document.getElementById('analysisContent'),
  llmConfigModal: document.getElementById('llmConfigModal'),
  llmBaseUrl: document.getElementById('llmBaseUrl'),
  llmModel: document.getElementById('llmModel'),
  llmTemperature: document.getElementById('llmTemperature'),
  llmMaxTokens: document.getElementById('llmMaxTokens'),
  llmApiKey: document.getElementById('llmApiKey'),
  llmSystemPrompt: document.getElementById('llmSystemPrompt'),
  llmConfigError: document.getElementById('llmConfigError'),
  saveLlmConfigBtn: document.getElementById('saveLlmConfigBtn'),
  aiResultModal: document.getElementById('aiResultModal'),
  aiResultContent: document.getElementById('aiResultContent')
};

function getLocalDateString(date = new Date()) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function normalizeError(error, fallback) {
  if (!error) return fallback;
  if (typeof error === 'string') return error;
  return error.message || fallback;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function toNumber(value) {
  const num = Number(value);
  return Number.isFinite(num) ? num : null;
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: refs.dateFilter.value,
    savedAt: Date.now(),
    allData: state.allData,
    seatCounts: state.seatCountCache
  }));
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function restoreFromStorage() {
  const cached = loadFromStorage();
  if (!cached || cached.date !== refs.dateFilter.value) {
    return false;
  }

  state.allData = Array.isArray(cached.allData) ? cached.allData : [];
  state.seatCountCache = cached.seatCounts && typeof cached.seatCounts === 'object' ? cached.seatCounts : {};
  refs.lastUpdate.textContent = cached.savedAt
    ? `已加载缓存 ${new Date(cached.savedAt).toLocaleTimeString()}`
    : '已加载缓存';
  return state.allData.length > 0;
}

function populateSelect(select, items, placeholder, preferredValue = '') {
  const values = Array.from(new Set(items.filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-CN'));
  select.innerHTML = `<option value="">${placeholder}</option>` + values.map((value) => (
    `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`
  )).join('');
  if (preferredValue && values.includes(preferredValue)) {
    select.value = preferredValue;
  }
}

function updateFilters() {
  const selectedCinema = refs.cinemaFilter.value;
  const selectedMovie = refs.movieFilter.value;
  const selectedHall = refs.hallFilter.value;

  populateSelect(refs.cinemaFilter, (state.config.cinemas || []).map((item) => item.name), '全部影院', selectedCinema);

  const cinemaScoped = state.allData.filter((cinema) => !refs.cinemaFilter.value || cinema.cinemaName === refs.cinemaFilter.value);
  populateSelect(refs.movieFilter, cinemaScoped.flatMap((cinema) => cinema.movies.map((movie) => movie.name)), '全部电影', selectedMovie);

  const movieScoped = cinemaScoped.map((cinema) => ({
    ...cinema,
    movies: cinema.movies.filter((movie) => !refs.movieFilter.value || movie.name === refs.movieFilter.value)
  }));

  populateSelect(
    refs.hallFilter,
    movieScoped.flatMap((cinema) => cinema.movies.flatMap((movie) => movie.shows.map((show) => show.hall || '普通厅'))),
    '全部影厅',
    selectedHall
  );
}

function getFilteredData() {
  const cinemaValue = refs.cinemaFilter.value;
  const movieValue = refs.movieFilter.value;
  const hallValue = refs.hallFilter.value;

  return state.allData
    .filter((cinema) => !cinemaValue || cinema.cinemaName === cinemaValue)
    .map((cinema) => ({
      ...cinema,
      movies: cinema.movies
        .filter((movie) => !movieValue || movie.name === movieValue)
        .map((movie) => ({
          ...movie,
          shows: movie.shows.filter((show) => !hallValue || (show.hall || '普通厅') === hallValue)
        }))
        .filter((movie) => movie.shows.length > 0)
    }))
    .filter((cinema) => cinema.movies.length > 0);
}

function computeEndTime(startTime, durationMinutes) {
  const [hours = '0', minutes = '0'] = String(startTime || '0:0').split(':');
  const totalMinutes = (Number(hours) * 60) + Number(minutes) + (Number(durationMinutes) || 0);
  const endHours = String(Math.floor(totalMinutes / 60) % 24).padStart(2, '0');
  const endMinutes = String(totalMinutes % 60).padStart(2, '0');
  return `${endHours}:${endMinutes}`;
}

function flattenRows(data) {
  const rows = [];

  data.forEach((cinema) => {
    cinema.movies.forEach((movie) => {
      movie.shows.forEach((show) => {
        const seatInfo = state.seatCountCache[show.seqNo];
        const total = seatInfo?.total || 0;
        const sold = seatInfo?.sold || 0;
        const rate = total > 0 ? sold / total : null;
        rows.push({
          cinemaName: cinema.cinemaName,
          cityName: cinema.cityName || '',
          movieName: movie.name,
          dur: Number(movie.dur) || 0,
          time: show.tm,
          endTime: computeEndTime(show.tm, movie.dur),
          lang: show.lang || '',
          hall: show.hall || '普通厅',
          tp: show.tp || '',
          price: toNumber(show.price),
          total,
          sold,
          available: total > 0 ? total - sold : 0,
          rate,
          seqNo: String(show.seqNo),
          rowClass: rate == null ? '' : rate >= 0.8 ? 'full' : rate >= 0.5 ? 'warn' : 'good'
        });
      });
    });
  });

  return rows;
}

function compareRows(left, right, key, direction) {
  const factor = direction === 'asc' ? 1 : -1;

  if (key === 'time') {
    const [leftHour, leftMinute] = left.time.split(':').map(Number);
    const [rightHour, rightMinute] = right.time.split(':').map(Number);
    return (((leftHour * 60) + leftMinute) - ((rightHour * 60) + rightMinute)) * factor;
  }

  if (['dur', 'price', 'rate'].includes(key)) {
    const leftValue = left[key] ?? -1;
    const rightValue = right[key] ?? -1;
    return (leftValue - rightValue) * factor;
  }

  return String(left[key] || '').localeCompare(String(right[key] || ''), 'zh-CN') * factor;
}

function renderTable() {
  const rows = flattenRows(getFilteredData());

  if (rows.length === 0) {
    refs.showsBody.innerHTML = '';
    refs.emptyState.style.display = 'block';
    refs.totalShows.textContent = '0';
    refs.totalCinemas.textContent = '0';
    return;
  }

  refs.emptyState.style.display = 'none';
  rows.sort((left, right) => compareRows(left, right, state.sort.key, state.sort.dir));
  refs.totalShows.textContent = String(rows.length);
  refs.totalCinemas.textContent = String(new Set(rows.map((row) => row.cinemaName)).size);

  refs.showsBody.innerHTML = rows.map((row) => {
    const ratePercent = row.rate == null ? '--' : `${Math.round(row.rate * 100)}%`;
    const barWidth = row.rate == null ? 0 : Math.round(row.rate * 100);
    const barColor = row.rate == null ? '#94a3b8' : row.rate >= 0.8 ? '#ef4444' : row.rate >= 0.5 ? '#f59e0b' : '#22c55e';
    const seatText = row.rate == null
      ? '<span class="muted">座位数据加载中</span>'
      : `已售 ${row.sold} / 总座位 ${row.total} / 可售 ${row.available}`;

    return `
      <tr
        class="${row.rowClass}"
        data-seq-no="${escapeHtml(row.seqNo)}"
        data-cinema-name="${encodeURIComponent(row.cinemaName)}"
        data-movie-name="${encodeURIComponent(row.movieName)}"
        data-time="${escapeHtml(row.time)}"
        data-hall="${encodeURIComponent(row.hall)}"
      >
        <td class="name">${escapeHtml(row.cinemaName)}</td>
        <td class="movie-cell">
          <div class="movie-title">${escapeHtml(row.movieName)}</div>
          <div class="movie-meta">${row.dur > 0 ? `${row.dur} 分钟` : '时长未知'} · ${escapeHtml(row.tp || '标准')} · ${escapeHtml(row.cityName || '未标注城市')}</div>
        </td>
        <td>
          <span class="time">${escapeHtml(row.time)}</span>
          <span class="time-meta">结束 ${escapeHtml(row.endTime)}</span>
        </td>
        <td>
          <div>${escapeHtml(row.hall)}</div>
          <div class="hall">${escapeHtml(row.lang || '未知语言')}</div>
        </td>
        <td class="price">${row.price == null ? '待定' : `¥${row.price}`}</td>
        <td>
          <div><span class="seat-bar"><span class="seat-bar-fill" style="width:${barWidth}%;background:${barColor}"></span></span>${ratePercent}</div>
          <div class="hall">${seatText}</div>
        </td>
      </tr>
    `;
  }).join('');
}

function setLoading(message) {
  refs.emptyState.style.display = 'none';
  refs.showsBody.innerHTML = `<tr><td colspan="6" class="loading">${escapeHtml(message)}</td></tr>`;
}

async function loadConfig() {
  const response = await fetch('/api/cinemas');
  const payload = await response.json();
  if (!payload.success) {
    throw new Error(normalizeError(payload.error, '加载影院配置失败'));
  }
  state.config = payload.data || { cinemas: [] };
  updateFilters();
}

async function loadLlmConfig() {
  const response = await fetch('/api/llm-config');
  const payload = await response.json();
  if (!payload.success) {
    throw new Error(normalizeError(payload.error, '加载模型配置失败'));
  }
  state.llmConfig = payload.data;
  refs.llmBaseUrl.value = payload.data.baseUrl || '';
  refs.llmModel.value = payload.data.model || '';
  refs.llmTemperature.value = payload.data.temperature ?? 0.4;
  refs.llmMaxTokens.value = payload.data.maxTokens ?? 1200;
  refs.llmApiKey.value = payload.data.apiKey || '';
  refs.llmSystemPrompt.value = payload.data.systemPrompt || '';
}

async function saveLlmConfig() {
  refs.llmConfigError.style.display = 'none';
  refs.saveLlmConfigBtn.disabled = true;
  refs.saveLlmConfigBtn.textContent = '保存中...';

  try {
    const response = await fetch('/api/llm-config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        baseUrl: refs.llmBaseUrl.value.trim(),
        model: refs.llmModel.value.trim(),
        apiKey: refs.llmApiKey.value.trim(),
        temperature: Number(refs.llmTemperature.value),
        maxTokens: Number(refs.llmMaxTokens.value),
        systemPrompt: refs.llmSystemPrompt.value.trim()
      })
    });
    const payload = await response.json();
    if (!payload.success) {
      throw new Error(normalizeError(payload.error, '保存模型配置失败'));
    }
    state.llmConfig = payload.data;
    closeModal('llmConfigModal');
  } catch (error) {
    refs.llmConfigError.textContent = error.message;
    refs.llmConfigError.style.display = 'block';
  } finally {
    refs.saveLlmConfigBtn.disabled = false;
    refs.saveLlmConfigBtn.textContent = '保存模型配置';
  }
}

async function loadShows() {
  setLoading('正在加载场次...');
  const date = refs.dateFilter.value || getLocalDateString();
  const response = await fetch(`/api/shows?date=${encodeURIComponent(date)}`);
  const payload = await response.json();

  if (!payload.success) {
    throw new Error(normalizeError(payload.error, '加载场次失败'));
  }

  state.allData = Array.isArray(payload.data) ? payload.data : [];
  state.seatCountCache = {};
  refs.lastUpdate.textContent = `场次已加载 ${new Date().toLocaleTimeString()}，正在补座位数据`;
  updateFilters();
  renderTable();
  saveToStorage();
}

function collectMissingSeqNos(data = getFilteredData()) {
  return Array.from(new Set(
    data.flatMap((cinema) => cinema.movies.flatMap((movie) => movie.shows.map((show) => String(show.seqNo))))
  )).filter((seqNo) => !state.seatCountCache[seqNo]);
}

async function loadMissingSeatCountsProgressively(data = getFilteredData()) {
  if (state.loadingSeatCounts) {
    return;
  }

  const seqNos = collectMissingSeqNos(data);
  if (seqNos.length === 0) {
    return;
  }

  state.loadingSeatCounts = true;
  let loaded = 0;

  try {
    for (let i = 0; i < seqNos.length; i += SEAT_REQUEST_BATCH) {
      const chunk = seqNos.slice(i, i + SEAT_REQUEST_BATCH);
      const response = await fetch('/api/seat-counts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ seqNos: chunk })
      });
      const payload = await response.json();

      if (!payload.success) {
        throw new Error(normalizeError(payload.error, '加载座位统计失败'));
      }

      Object.assign(state.seatCountCache, payload.data || {});
      loaded += chunk.length;
      refs.lastUpdate.textContent = `场次已加载，座位进度 ${loaded}/${seqNos.length}`;
      saveToStorage();
      renderTable();
    }

    refs.lastUpdate.textContent = `全部完成 ${new Date().toLocaleTimeString()}`;
  } catch (error) {
    console.warn('Seat counts failed:', error.message);
    refs.lastUpdate.textContent = '场次已加载，部分座位数据失败';
  } finally {
    state.loadingSeatCounts = false;
  }
}

async function refreshData() {
  refs.refreshBtn.disabled = true;
  try {
    await loadShows();
    void loadMissingSeatCountsProgressively(state.allData);
  } catch (error) {
    refs.showsBody.innerHTML = `<tr><td colspan="6" class="loading error-msg">${escapeHtml(error.message)}</td></tr>`;
    refs.totalShows.textContent = '0';
    refs.totalCinemas.textContent = '0';
  } finally {
    refs.refreshBtn.disabled = false;
  }
}

async function showSeatMap(seqNo, cinemaName, movieName, time, hall) {
  refs.modalTitle.textContent = `${cinemaName} - ${movieName} ${time} ${hall}`;
  refs.seatMapContent.innerHTML = '<div class="loading">正在加载座位图...</div>';
  refs.seatMapModal.classList.add('show');

  try {
    const response = await fetch(`/api/seat-map?seqNo=${encodeURIComponent(seqNo)}&ticketCount=2`);
    const payload = await response.json();

    if (!payload.success) {
      throw new Error(normalizeError(payload.error, '请先登录猫眼账号'));
    }

    const data = payload.data || {};
    let content = data.seatMapText || '座位图不可用';

    if (Array.isArray(data.recommendedSeats) && data.recommendedSeats.length > 0) {
      const recommended = data.recommendedSeats
        .map((seat) => `${seat.rowNum}排${seat.columnId}座 ¥${seat.price}`)
        .join('、');
      content += `\n\n推荐座位：${recommended}`;
    }

    if (data.priceInfo) {
      content += `\n${data.priceInfo}`;
    }

    refs.seatMapContent.innerHTML = `<pre class="seat-map">${escapeHtml(content)}</pre>`;
  } catch (error) {
    refs.seatMapContent.innerHTML = `<div class="loading error-msg">${escapeHtml(error.message)}</div>`;
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

async function checkLoginStatus() {
  try {
    const response = await fetch('/api/auth-status');
    const payload = await response.json();
    if (payload.data?.loggedIn) {
      refs.loginStatus.textContent = `已登录 ${payload.data.userName || ''}`.trim();
      refs.loginStatus.style.display = 'inline';
    } else {
      refs.loginStatus.style.display = 'none';
    }
  } catch (error) {
    console.warn('Auth status check failed:', error.message);
  }
}

function buildAnalysisTable(headers, rows) {
  const headHtml = headers.map((header) => `<th>${escapeHtml(header)}</th>`).join('');
  const bodyHtml = rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
  return `<table class="analysis-table"><thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`;
}

function buildAnalysisPayload(rows) {
  const summary = {
    totalShows: rows.length,
    cinemaCount: new Set(rows.map((row) => row.cinemaName)).size,
    movieCount: new Set(rows.map((row) => row.movieName)).size,
    averageOccupancy: (() => {
      const valid = rows.filter((row) => row.rate != null);
      if (valid.length === 0) return null;
      return Number((valid.reduce((sum, row) => sum + row.rate, 0) / valid.length).toFixed(4));
    })()
  };

  return {
    filters: {
      date: refs.dateFilter.value,
      cinema: refs.cinemaFilter.value,
      movie: refs.movieFilter.value,
      hall: refs.hallFilter.value
    },
    summary,
    rows
  };
}

async function runAiScheduleAnalysis() {
  const rows = flattenRows(getFilteredData());
  if (rows.length === 0) {
    alert('请先查询数据');
    return;
  }

  refs.aiSuggestBtn.disabled = true;
  refs.aiResultContent.textContent = '正在调用模型分析当前排片，请稍候...';
  refs.aiResultModal.classList.add('show');

  try {
    const response = await fetch('/api/ai-schedule-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildAnalysisPayload(rows))
    });
    const payload = await response.json();
    if (!payload.success) {
      throw new Error(normalizeError(payload.error, 'AI 分析失败'));
    }

    const modelInfo = payload.data?.model ? `模型: ${payload.data.model}\n\n` : '';
    refs.aiResultContent.textContent = `${modelInfo}${payload.data.content}`;
  } catch (error) {
    refs.aiResultContent.textContent = `分析失败: ${error.message}`;
  } finally {
    refs.aiSuggestBtn.disabled = false;
  }
}

function showAnalysisReport() {
  const rows = flattenRows(getFilteredData());
  if (rows.length === 0) {
    alert('请先查询数据');
    return;
  }

  let totalSeats = 0;
  let totalSold = 0;
  const cinemaStats = new Map();
  const movieStats = new Map();
  const hallStats = new Map();
  const timeStats = { morning: 0, afternoon: 0, evening: 0, late: 0 };
  const prices = [];

  rows.forEach((row) => {
    if (row.price != null) prices.push(row.price);
    totalSeats += row.total;
    totalSold += row.sold;

    const cinema = cinemaStats.get(row.cinemaName) || { shows: 0, seats: 0, sold: 0 };
    cinema.shows += 1;
    cinema.seats += row.total;
    cinema.sold += row.sold;
    cinemaStats.set(row.cinemaName, cinema);

    const movie = movieStats.get(row.movieName) || { shows: 0, halls: new Set(), prices: [] };
    movie.shows += 1;
    movie.halls.add(row.hall);
    if (row.price != null) movie.prices.push(row.price);
    movieStats.set(row.movieName, movie);

    const hall = hallStats.get(row.hall) || { shows: 0, seats: 0, sold: 0 };
    hall.shows += 1;
    hall.seats += row.total;
    hall.sold += row.sold;
    hallStats.set(row.hall, hall);

    const hour = Number(row.time.split(':')[0]);
    if (hour < 12) timeStats.morning += 1;
    else if (hour < 17) timeStats.afternoon += 1;
    else if (hour < 21) timeStats.evening += 1;
    else timeStats.late += 1;
  });

  const occupancy = totalSeats > 0 ? `${(totalSold / totalSeats * 100).toFixed(1)}%` : '0.0%';
  const priceSummary = prices.length
    ? { min: Math.min(...prices), max: Math.max(...prices), avg: (prices.reduce((sum, price) => sum + price, 0) / prices.length).toFixed(1) }
    : null;

  const cinemaRows = Array.from(cinemaStats.entries()).sort((a, b) => b[1].shows - a[1].shows).map(([name, stats]) => [
    name,
    String(stats.shows),
    stats.seats > 0 ? String(stats.seats) : '-',
    stats.seats > 0 ? String(stats.sold) : '-',
    stats.seats > 0 ? `${(stats.sold / stats.seats * 100).toFixed(1)}%` : '0.0%'
  ]);

  const movieRows = Array.from(movieStats.entries()).sort((a, b) => b[1].shows - a[1].shows).map(([name, stats]) => [
    name,
    String(stats.shows),
    Array.from(stats.halls).join('、'),
    stats.prices.length ? `¥${Math.min(...stats.prices)} - ¥${Math.max(...stats.prices)}` : '-'
  ]);

  const hallRows = Array.from(hallStats.entries()).sort((a, b) => b[1].shows - a[1].shows).map(([name, stats]) => [
    name,
    String(stats.shows),
    stats.seats > 0 ? String(stats.seats) : '-',
    stats.seats > 0 ? String(stats.sold) : '-',
    stats.seats > 0 ? `${(stats.sold / stats.seats * 100).toFixed(1)}%` : '0.0%'
  ]);

  refs.analysisContent.innerHTML = `
    <div class="analysis-grid">
      <div class="analysis-card"><div class="num">${rows.length}</div><div class="label">场次总数</div></div>
      <div class="analysis-card"><div class="num">${cinemaStats.size}</div><div class="label">影院数量</div></div>
      <div class="analysis-card"><div class="num">${movieStats.size}</div><div class="label">电影数量</div></div>
      <div class="analysis-card"><div class="num">${occupancy}</div><div class="label">平均上座率</div></div>
    </div>
    <div class="analysis-section">
      <h3>影院明细</h3>
      ${buildAnalysisTable(['影院', '场次', '总座位', '已售', '上座率'], cinemaRows)}
    </div>
    <div class="analysis-section">
      <h3>电影明细</h3>
      ${buildAnalysisTable(['电影', '场次', '影厅分布', '票价区间'], movieRows)}
    </div>
    <div class="analysis-section">
      <h3>时段分布</h3>
      <div class="analysis-grid">
        <div class="analysis-card"><div class="num">${timeStats.morning}</div><div class="label">早场（12点前）</div></div>
        <div class="analysis-card"><div class="num">${timeStats.afternoon}</div><div class="label">下午（12-17点）</div></div>
        <div class="analysis-card"><div class="num">${timeStats.evening}</div><div class="label">晚场（17-21点）</div></div>
        <div class="analysis-card"><div class="num">${timeStats.late}</div><div class="label">夜场（21点后）</div></div>
      </div>
    </div>
    <div class="analysis-section">
      <h3>影厅明细</h3>
      ${buildAnalysisTable(['影厅', '场次', '总座位', '已售', '上座率'], hallRows)}
    </div>
    <div class="analysis-section">
      <h3>价格分析</h3>
      ${priceSummary ? `
        <div class="analysis-grid">
          <div class="analysis-card"><div class="num">¥${priceSummary.min}</div><div class="label">最低票价</div></div>
          <div class="analysis-card"><div class="num">¥${priceSummary.avg}</div><div class="label">平均票价</div></div>
          <div class="analysis-card"><div class="num">¥${priceSummary.max}</div><div class="label">最高票价</div></div>
          <div class="analysis-card"><div class="num">${prices.length}</div><div class="label">计价场次</div></div>
        </div>
      ` : '<div class="empty-state" style="padding:20px">暂无价格数据</div>'}
    </div>
  `;

  refs.analysisModal.classList.add('show');
}

document.querySelectorAll('th[data-key]').forEach((header) => {
  header.addEventListener('click', () => {
    const key = header.dataset.key;
    if (state.sort.key === key) {
      state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sort.key = key;
      state.sort.dir = 'asc';
    }

    document.querySelectorAll('th[data-key]').forEach((cell) => {
      cell.dataset.sort = '';
    });
    header.dataset.sort = state.sort.dir;
    renderTable();
  });
});

refs.cinemaFilter.addEventListener('change', () => {
  updateFilters();
  renderTable();
  void loadMissingSeatCountsProgressively();
});

refs.movieFilter.addEventListener('change', () => {
  updateFilters();
  renderTable();
  void loadMissingSeatCountsProgressively();
});

refs.hallFilter.addEventListener('change', () => {
  renderTable();
  void loadMissingSeatCountsProgressively();
});

refs.dateFilter.addEventListener('change', () => {
  state.allData = [];
  state.seatCountCache = {};
  updateFilters();
  renderTable();
  refs.lastUpdate.textContent = '日期已切换，请刷新数据';
});

refs.refreshBtn.addEventListener('click', () => {
  void refreshData();
});

refs.analysisBtn.addEventListener('click', showAnalysisReport);
refs.aiSuggestBtn.addEventListener('click', () => {
  void runAiScheduleAnalysis();
});
refs.llmConfigBtn.addEventListener('click', () => {
  refs.llmConfigError.style.display = 'none';
  refs.llmConfigModal.classList.add('show');
});
refs.saveLlmConfigBtn.addEventListener('click', () => {
  void saveLlmConfig();
});

refs.showsBody.addEventListener('click', (event) => {
  const row = event.target.closest('tr[data-seq-no]');
  if (!row) return;

  void showSeatMap(
    row.dataset.seqNo,
    decodeURIComponent(row.dataset.cinemaName),
    decodeURIComponent(row.dataset.movieName),
    row.dataset.time,
    decodeURIComponent(row.dataset.hall)
  );
});

document.querySelectorAll('[data-close]').forEach((button) => {
  button.addEventListener('click', () => closeModal(button.dataset.close));
});

[refs.seatMapModal, refs.loginModal, refs.analysisModal, refs.llmConfigModal, refs.aiResultModal].forEach((modal) => {
  modal.addEventListener('click', (event) => {
    if (event.target === modal) {
      modal.classList.remove('show');
    }
  });
});

refs.loginBtn.addEventListener('click', () => {
  refs.authTokenInput.value = '';
  refs.loginError.style.display = 'none';
  refs.loginModal.classList.add('show');
});

refs.doLoginBtn.addEventListener('click', async () => {
  const token = refs.authTokenInput.value.trim();
  if (!token) {
    refs.loginError.textContent = '请输入 Token';
    refs.loginError.style.display = 'block';
    return;
  }

  refs.doLoginBtn.disabled = true;
  refs.doLoginBtn.textContent = '登录中...';

  try {
    const response = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const payload = await response.json();
    if (!payload.success) {
      throw new Error(normalizeError(payload.error, '登录失败'));
    }

    closeModal('loginModal');
    await checkLoginStatus();
  } catch (error) {
    refs.loginError.textContent = error.message;
    refs.loginError.style.display = 'block';
  } finally {
    refs.doLoginBtn.disabled = false;
    refs.doLoginBtn.textContent = '确认登录';
  }
});

async function init() {
  refs.dateFilter.value = getLocalDateString();

  try {
    await Promise.all([loadConfig(), loadLlmConfig()]);
  } catch (error) {
    refs.lastUpdate.textContent = error.message;
    refs.showsBody.innerHTML = `<tr><td colspan="6" class="loading error-msg">${escapeHtml(error.message)}</td></tr>`;
    return;
  }

  const hasCache = restoreFromStorage();
  updateFilters();
  renderTable();
  await checkLoginStatus();

  if (hasCache) {
    void loadMissingSeatCountsProgressively(state.allData);
  }
}

init();
</script>
</body>
</html>
