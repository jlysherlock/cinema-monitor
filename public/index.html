<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影院场次监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333}
header{background:#1a1a2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{color:#fff;font-size:18px;font-weight:600}
header h1 span{color:#e94560}
.controls{display:flex;gap:8px;flex-wrap:wrap}
select,button{padding:6px 12px;border:none;border-radius:4px;font-size:13px;outline:none}
select{background:#fff;color:#333;border:1px solid #ddd}
button{background:#e94560;color:#fff;cursor:pointer;transition:background .2s}
button:hover{background:#c73151}
button.active{background:#4ecca3}
.status{padding:8px 24px;background:#16213e;color:#aaa;font-size:12px;display:flex;justify-content:space-between}
.status span:last-child{color:#4ecca3}
main{padding:16px 24px}
.table-wrap{overflow-x:auto;border-radius:8px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f0f0f5}
th{padding:10px 12px;text-align:left;font-weight:600;color:#555;white-space:nowrap;position:sticky;top:0;background:#f0f0f5;z-index:2;cursor:pointer;user-select:None}
th:hover{background:#e0e0ea}
th[data-sort]::after{content:' ⇅';opacity:0.4;font-size:11px}
th[data-sort="asc"]::after{content:' ↑';opacity:1}
th[data-sort="desc"]::after{content:' ↓';opacity:1}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tbody tr:hover{background:#fafafa;cursor:pointer}
tbody tr:hover td{background:#fef3f4}
tr.good td{background:#e8f5e9}
tr.warn td{background:#fff8e1}
tr.full td{background:#ffebee}
tr.good:hover td{background:#e8f5e9!important}
tr.warn:hover td{background:#fff8e1!important}
tr.full:hover td{background:#ffebee!important}
.score{color:#e94560;font-weight:600}
.name{font-weight:600;color:#222}
.time{font-weight:600;color:#1a1a2e}
.price{color:#e94560;font-weight:700}
.hall{color:#777;font-size:12px}
.td-small{font-size:12px;color:#888}
.seat-bar{width:100px;height:12px;border-radius:6px;vertical-align:middle;margin-right:8px;overflow:hidden;background:#eee}
.seat-bar-fill{height:100%;border-radius:6px}
.seat-bar-fill.warn{background:#ffc107}
.seat-bar-fill.full{background:#e94560}
.empty-state{padding:60px;text-align:center;color:#999;font-size:14px}
.loading{text-align:center;padding:40px;color:#888}
.error-msg{color:#e94560;font-size:12px;margin-top:4px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:12px;width:90vw;max-width:700px;max-height:90vh;overflow:auto;padding:24px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:16px;color:#222}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888}
.seat-map{font-family:'Courier New',monospace;line-height:1.4;font-size:13px;white-space:pre;color:#444}
.legend{margin-top:12px;font-size:12px;color:#888}
.legend span{margin-right:16px}
.legend .sq{color:#4ecca3}
.legend .sd{color:#ddd}
.legend .so{color:#e94560}
.analysis-section{margin-bottom:24px}
.analysis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.analysis-card{background:#f5f5f5;padding:12px;border-radius:8px;text-align:center}
.analysis-card .num{font-size:24px;font-weight:700;color:#e94560}
.analysis-card .label{color:#666;font-size:12px}
.analysis-table{width:100%;border-collapse:collapse;font-size:12px}
.analysis-table th{background:#f0f0f5;padding:8px;font-weight:600;text-align:left}
.analysis-table td{padding:8px;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>
<header>
  <h1>🎬 影院场次监控 <span>| 实时可售</span></h1>
  <div class="controls">
    <input type="date" id="dateFilter" style="padding:6px 12px;border:1px solid #ddd;border-radius:4px;font-size:13px">
    <select id="cinemaFilter"><option value="">全部影院</option></select>
    <button id="refreshBtn">🔍 查询</button>
    <button id="loginBtn">🔐 登录猫眼</button>
    <button id="analysisBtn">📊 分析报告</button>
    <span id="loginStatus" style="color:#4ecca3;font-size:12px;display:none"></span>
  </div>
</header>
<div class="status">
  <span>共 <b id="totalShows">0</b> 场 / <b id="totalCinemas">0</b> 家影院</span>
  <span id="lastUpdate">加载中...</span>
</div>
<main>
  <div class="table-wrap">
    <table id="showsTable">
      <thead>
        <tr>
          <th data-key="cinemaName" data-sort="">影院</th>
          <th><select id="movieFilter" style="width:100%;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer"><option value="">电影</option></select></th>
          <th data-key="dur" data-sort="">时长</th>
          <th data-key="time" data-sort="asc">开始</th>
          <th>结束</th>
          <th data-key="lang" data-sort="">语言</th>
          <th><select id="hallFilter" style="width:100%;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer"><option value="">全部影厅</option></select></th>
          <th data-key="tp" data-sort="">版本</th>
          <th data-key="price" data-sort="">票价</th>
          <th data-key="total" data-sort="">总座位</th>
          <th data-key="sold" data-sort="">已售</th>
          <th data-key="rate" data-sort="">上座率</th>
        </tr>
      </thead>
      <tbody id="showsBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">暂无数据</div>
  </div>
</main>
<div class="modal" id="seatMapModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">座位图</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="seatMapContent"></div>
    <div class="legend">
      <span class="sq">□ 可售</span>
      <span class="sd">■ 已售</span>
      <span class="so">● 情侣座</span>
    </div>
  </div>
</div>
<div class="modal" id="loginModal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <h2>登录猫眼账号</h2>
      <button class="modal-close" onclick="closeLoginModal()">×</button>
    </div>
    <div style="padding:8px 0">
      <p style="margin-bottom:12px;font-size:13px;color:#666">
        点击下方链接获取 Token：<br>
        <a href="https://m.maoyan.com/mtrade/openclaw/token" target="_blank" style="color:#e94560">https://m.maoyan.com/mtrade/openclaw/token</a>
      </p>
      <textarea id="authTokenInput" placeholder="粘贴 Token 到此处" rows="3" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:13px;resize:vertical"></textarea>
      <div id="loginError" style="color:#e94560;font-size:12px;margin-top:8px;display:none"></div>
      <button id="doLoginBtn" style="margin-top:12px;padding:8px 20px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer">确认登录</button>
    </div>
  </div>
</div>
<div class="modal" id="analysisModal">
  <div class="modal-box" style="max-width:900px">
    <div class="modal-header">
      <h2>📊 数据分析报告</h2>
      <button class="modal-close" onclick="closeAnalysisModal()">×</button>
    </div>
    <div id="analysisContent" style="padding:8px 0;max-height:70vh;overflow-y:auto"></div>
  </div>
</div>
<script>
let allData = [];
let autoInterval = null;
let autoOn = false;
let seatCountCache = {};
const STORAGE_KEY = 'cinema_shows_data';

function saveToStorage() {
  const minimal = allData.map(c => ({
    cinemaId: c.cinemaId,
    cinemaName: c.cinemaName,
    cityId: c.cityId,
    cityName: c.cityName,
    movies: c.movies.map(m => ({
      movieId: m.movieId,
      name: m.name,
      dur: m.dur,
      shows: m.shows
    }))
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ allData: minimal, seatCounts: seatCountCache, savedAt: Date.now() }));
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return data;
  } catch { return null; }
}

const REFRESH_MS = 60 * 1000;

async function loadShows() {
  document.getElementById('showsBody').innerHTML = '<tr><td colspan="12" class="loading">加载中...</td></tr>';
  seatCountCache = {};
  try {
    const dateFilter = document.getElementById('dateFilter').value;
    const url = '/api/shows' + (dateFilter ? '?date=' + dateFilter : '');
    const res = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    allData = json.data;
    saveToStorage();
    updateFilters();
    document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
    document.getElementById('totalCinemas').textContent = allData.length;
    let totalShows = 0;
    allData.forEach(c => c.movies.forEach(m => totalShows += m.shows.length));
    document.getElementById('totalShows').textContent = totalShows;
  } catch (e) {
    document.getElementById('showsBody').innerHTML = `<tr><td colspan="12" class="error-msg">加载失败: ${e.message}</td></tr>`;
  }
}

async function loadSeatCounts() {
  const seqNos = [];
  allData.forEach(c => c.movies.forEach(m => m.shows.forEach(s => seqNos.push(s.seqNo))));

  try {
    const res = await fetch('/api/seat-counts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ seqNos })
    });
    const json = await res.json();
    if (json.success) {
      seatCountCache = json.data;
      saveToStorage();
      renderTable();
    }
  } catch (e) {
    console.warn('Seat counts failed:', e.message);
  }
}

async function loadSeatCountsForFiltered() {
  const data = getFilteredData();
  const seqNos = [];
  data.forEach(c => c.movies.forEach(m => m.shows.forEach(s => seqNos.push(s.seqNo))));

  try {
    const res = await fetch('/api/seat-counts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ seqNos })
    });
    const json = await res.json();
    if (json.success) {
      Object.assign(seatCountCache, json.data);
    }
  } catch (e) {
    console.warn('Seat counts failed:', e.message);
  }
}

function updateFilters() {
  const cinemaSel = document.getElementById('cinemaFilter');
  const movieSel = document.getElementById('movieFilter');
  const hallSel = document.getElementById('hallFilter');
  const selCinema = cinemaSel.value;
  const selMovie = movieSel.value;
  const selHall = hallSel.value;

  fetch('/api/cinemas').then(res => res.json()).then(json => {
    if (!json.success) return;
    const cinemas = json.data.cinemas;
    cinemaSel.innerHTML = '<option value="">全部影院</option>' + cinemas.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    cinemaSel.value = selCinema;
  });

  const movies = [...new Set(allData.flatMap(d => d.movies.map(m => m.name)))].sort();
  movieSel.innerHTML = '<option value="">全部电影</option>' + movies.map(m => `<option value="${m}">${m}</option>`).join('');
  movieSel.value = selMovie;

  const halls = [...new Set(allData.flatMap(d => d.movies.flatMap(m => m.shows.map(s => s.hall))))].sort();
  hallSel.innerHTML = '<option value="">全部影厅</option>' + halls.map(h => `<option value="${h}">${h}</option>`).join('');
  hallSel.value = selHall;
}

function getFilteredData() {
  const cinema = document.getElementById('cinemaFilter').value;
  const movie = document.getElementById('movieFilter').value;
  const hall = document.getElementById('hallFilter').value;

  return allData.filter(d => {
    if (cinema && d.cinemaName !== cinema) return false;
    return true;
  }).map(d => ({
    ...d,
    movies: d.movies.filter(m => !movie || m.name === movie)
  })).filter(d => d.movies.length > 0).map(d => ({
    ...d,
    movies: d.movies.map(m => ({
      ...m,
      shows: m.shows.filter(s => !hall || s.hall === hall)
    }))
  })).filter(d => d.movies.length > 0);
}

function renderTable() {
  const data = getFilteredData();
  const tbody = document.getElementById('showsBody');
  const empty = document.getElementById('emptyState');

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('totalCinemas').textContent = '0';
    document.getElementById('totalShows').textContent = '0';
    return;
  }
  empty.style.display = 'none';

  let totalShows = 0;
  data.forEach(c => c.movies.forEach(m => totalShows += m.shows.length));
  document.getElementById('totalCinemas').textContent = data.length;
  document.getElementById('totalShows').textContent = totalShows;

  // Flatten to rows with all needed fields
  let rows = [];
  data.forEach(cinema => {
    cinema.movies.forEach(movie => {
      movie.shows.forEach(show => {
        const seatInfo = seatCountCache[show.seqNo];
        let rowClass = '';
        let total = 0, sold = 0, rate = 0;

        if (seatInfo && seatInfo.total > 0) {
          total = seatInfo.total;
          sold = seatInfo.sold;
          rate = sold / total;
          if (rate >= 0.8) rowClass = 'full';
          else if (rate >= 0.5) rowClass = 'warn';
          else rowClass = 'good';
        }

        rows.push({
          cityName: cinema.cityName,
          cinemaName: cinema.cinemaName,
          movieName: movie.name,
          dur: movie.dur,
          time: show.tm,
          lang: show.lang,
          hall: show.hall,
          tp: show.tp,
          price: show.price,
          total, sold, rate,
          seqNo: show.seqNo,
          rowClass
        });
      });
    });
  });

  // Sort if active
  if (sortState.key) {
    const key = sortState.key;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    rows.sort((a, b) => {
      let va = a[key], vb = b[key];
      if (key === 'time') {
        va = String(va).replace(':', '');
        vb = String(vb).replace(':', '');
      }
      if (typeof va === 'number') return (va - vb) * dir;
      return String(va).localeCompare(String(vb)) * dir;
    });
  }

  let html = '';
  rows.forEach(r => {
    const ratePct = r.rate > 0 ? Math.round(r.rate * 100) + '%' : '-';
    const priceDisplay = r.price ? '¥' + r.price + '元' : '-';
    const [h, m] = r.time.split(':').map(Number);
    const endMins = h * 60 + m + (r.dur || 0);
    const endTime = `${String(Math.floor(endMins / 60) % 24).padStart(2, '0')}:${String(endMins % 60).padStart(2, '0')}`;

    html += `<tr onclick="showSeatMap('${r.seqNo}','${r.cinemaName}','${r.movieName}','${r.time}','${r.hall}')">`;
    html += `<td class="name">${r.cinemaName}</td>`;
    html += `<td class="name">${r.movieName}</td>`;
    html += `<td class="td-small">${r.dur}分钟</td>`;
    html += `<td class="time">${r.time}</td>`;
    html += `<td class="time">${endTime}</td>`;
    html += `<td>${r.lang}</td>`;
    html += `<td class="hall">${r.hall}</td>`;
    html += `<td>${r.tp}</td>`;
    html += `<td class="price">${priceDisplay}</td>`;
    html += `<td>${r.total || '-'}</td>`;
    html += `<td>${r.sold || '-'}</td>`;
    const barW = r.rate > 0 ? Math.round(r.rate * 100) : 0;
    const barColor = r.rate >= 0.5 ? (r.rate >= 0.8 ? '#e94560' : '#ffc107') : '#4ecca3';
    html += `<td><span class="seat-bar" style="background:#eee"><span class="seat-bar-fill" style="width:${barW}px;background:${barColor}"></span></span>${ratePct}</td>`;
    html += '</tr>';
  });

  tbody.innerHTML = html;
}

document.getElementById('cinemaFilter').addEventListener('change', () => {
  allData = [];
  seatCountCache = {};
  document.getElementById('showsBody').innerHTML = '';
  document.getElementById('emptyState').style.display = 'block';
});

document.getElementById('movieFilter').addEventListener('change', () => {
  const movie = document.getElementById('movieFilter').value;
  const hall = document.getElementById('hallFilter').value;
  const movieSel = document.getElementById('movieFilter');
  const hallSel = document.getElementById('hallFilter');
  const selMovie = movieSel.value;
  const selHall = hallSel.value;

  const filteredData = allData.filter(d => !movie || d.movies.some(m => m.name === movie));
  const movies = [...new Set(filteredData.flatMap(d => d.movies.map(m => m.name)))].sort();
  const halls = [...new Set(filteredData.flatMap(d => d.movies.flatMap(m => m.shows.map(s => s.hall))))].sort();
  movieSel.innerHTML = '<option value="">电影</option>' + movies.map(m => `<option value="${m}">${m}</option>`).join('');
  hallSel.innerHTML = '<option value="">全部影厅</option>' + halls.map(h => `<option value="${h}">${h}</option>`).join('');
  movieSel.value = selMovie;
  hallSel.value = selHall;

  renderTable();
});

document.getElementById('hallFilter').addEventListener('change', () => {
  const movie = document.getElementById('movieFilter').value;
  const hall = document.getElementById('hallFilter').value;
  const movieSel = document.getElementById('movieFilter');
  const hallSel = document.getElementById('hallFilter');
  const selMovie = movieSel.value;
  const selHall = hallSel.value;

  const filteredData = allData.filter(d => d.movies.some(m => m.shows.some(s => !hall || s.hall === hall)));
  const movies = [...new Set(filteredData.flatMap(d => d.movies.map(m => m.name)))].sort();
  const halls = [...new Set(allData.flatMap(d => d.movies.flatMap(m => m.shows.map(s => s.hall))))].sort();
  movieSel.innerHTML = '<option value="">电影</option>' + movies.map(m => `<option value="${m}">${m}</option>`).join('');
  hallSel.innerHTML = '<option value="">全部影厅</option>' + halls.map(h => `<option value="${h}">${h}</option>`).join('');
  movieSel.value = selMovie;
  hallSel.value = selHall;

  renderTable();
});


function updateCinemaFilter() {
  const cinemaSel = document.getElementById('cinemaFilter');

  // Get cinema options from config
  fetch('/api/cinemas').then(res => res.json()).then(json => {
    if (!json.success) return;
    const cinemas = json.data.cinemas;
    cinemaSel.innerHTML = '<option value="">全部影院</option>' + cinemas.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  });
}

document.getElementById('refreshBtn').addEventListener('click', async () => {
  seatCountCache = {};
  await loadShows();
  await loadSeatCountsForFiltered();
  renderTable();
});

async function showSeatMap(seqNo, cinemaName, movieName, time, hall) {
  const modal = document.getElementById('seatMapModal');
  const content = document.getElementById('seatMapContent');
  const title = document.getElementById('modalTitle');
  title.textContent = `${cinemaName} - ${movieName} ${time} ${hall}`;
  content.innerHTML = '<div class="loading">加载座位图...</div>';
  modal.classList.add('show');

  try {
    const res = await fetch(`/api/seat-map?seqNo=${seqNo}&ticketCount=2`);
    const json = await res.json();

    if (!json.success) {
      content.innerHTML = `<div class="error-msg">获取座位图失败: ${json.error?.message || '请先登录猫眼账号'}</div>`;
      return;
    }

    const d = json.data;
    const seats = d.seatMapText;

    let seatHtml = seats || '座位图不可用';

    if (d.recommendedSeats && d.recommendedSeats.length > 0) {
      seatHtml += '\n\n推荐座位：' + d.recommendedSeats.map(s => `${s.rowNum}排${s.columnId}座 ¥${s.price}元`).join('、');
    }
    if (d.priceInfo) {
      seatHtml += '\n' + d.priceInfo;
    }

    content.innerHTML = `<pre class="seat-map">${seatHtml}</pre>`;
  } catch (e) {
    content.innerHTML = `<div class="error-msg">加载失败: ${e.message}</div>`;
  }
}

function closeModal() {
  document.getElementById('seatMapModal').classList.remove('show');
}

document.getElementById('seatMapModal').addEventListener('click', (e) => {
  if (e.target.id === 'seatMapModal') closeModal();
});

let sortState = { key: 'time', dir: 'asc' };

document.querySelectorAll('th[data-key]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortState.key === key) {
      sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sortState.key = key;
      sortState.dir = 'asc';
    }
    document.querySelectorAll('th[data-key]').forEach(t => t.dataset.sort = '');
    th.dataset.sort = sortState.dir;
    renderTable();
  });
});

// Initial load - show empty state, populate filters from config
async function initFilters() {
  try {
    const res = await fetch('/api/cinemas');
    const json = await res.json();
    if (!json.success) return;

    const cinemas = json.data.cinemas;
    const cinemaSel = document.getElementById('cinemaFilter');

    cinemaSel.innerHTML = '<option value="">全部影院</option>' + cinemas.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  } catch (e) {
    console.warn('Failed to load config:', e.message);
  }
}

document.getElementById('dateFilter').valueAsDate = new Date();
initFilters();

async function checkLoginStatus() {
  try {
    const res = await fetch('/api/auth-status');
    const json = await res.json();
    const statusEl = document.getElementById('loginStatus');
    if (json.data?.loggedIn) {
      statusEl.textContent = '已登录: ' + (json.data.userName || '');
      statusEl.style.display = 'inline';
    } else {
      statusEl.style.display = 'none';
    }
  } catch (e) {
    console.warn('Auth status check failed:', e.message);
  }
}

checkLoginStatus();

function closeAnalysisModal() {
  document.getElementById('analysisModal').classList.remove('show');
}

document.getElementById('analysisModal').addEventListener('click', (e) => {
  if (e.target.id === 'analysisModal') closeAnalysisModal();
});

document.getElementById('analysisBtn').addEventListener('click', () => {
  showAnalysisReport();
});

function showAnalysisReport() {
  if (allData.length === 0) {
    alert('请先查询数据');
    return;
  }

  const modal = document.getElementById('analysisModal');
  const content = document.getElementById('analysisContent');
  modal.classList.add('show');

  const data = getFilteredData();

  // 1. Overview
  let totalShows = 0, totalSeats = 0, totalSold = 0;
  const cinemaStats = {};
  const movieStats = {};
  const hallStats = {};
  const timeStats = { morning: 0, afternoon: 0, evening: 0, late: 0 };
  const priceStats = [];

  data.forEach(cinema => {
    cinemaStats[cinema.cinemaName] = { shows: 0, seats: 0, sold: 0 };
    cinema.movies.forEach(movie => {
      if (!movieStats[movie.name]) {
        movieStats[movie.name] = { shows: 0, seats: 0, sold: 0, halls: new Set(), prices: [] };
      }
      movie.shows.forEach(show => {
        totalShows++;
        cinemaStats[cinema.cinemaName].shows++;
        movieStats[movie.name].shows++;
        movieStats[movie.name].halls.add(show.hall);

        const seatInfo = seatCountCache[show.seqNo];
        let seats = 0, sold = 0;
        if (seatInfo && seatInfo.total > 0) {
          seats = seatInfo.total;
          sold = seatInfo.sold;
          totalSeats += seats;
          totalSold += sold;
          cinemaStats[cinema.cinemaName].seats += seats;
          cinemaStats[cinema.cinemaName].sold += sold;
          movieStats[movie.name].seats += seats;
          movieStats[movie.name].sold += sold;
        }

        if (!hallStats[show.hall]) hallStats[show.hall] = { shows: 0, seats: 0, sold: 0 };
        hallStats[show.hall].shows++;
        hallStats[show.hall].seats += seats;
        hallStats[show.hall].sold += sold;

        if (show.price) priceStats.push(show.price);

        const hour = parseInt(show.tm.split(':')[0]);
        if (hour < 12) timeStats.morning++;
        else if (hour < 17) timeStats.afternoon++;
        else if (hour < 21) timeStats.evening++;
        else timeStats.late++;
      });
    });
  });

  const avgOccupancy = totalSeats > 0 ? (totalSold / totalSeats * 100).toFixed(1) : '0.0';

  let html = '<div style="font-size:13px">';

  // Overview section
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">📈 总览</h3>`;
  html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">`;
  html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:24px;font-weight:700;color:#e94560">${totalShows}</div><div style="color:#666;font-size:12px">总场次</div></div>`;
  html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:24px;font-weight:700;color:#4ecca3">${data.length}</div><div style="color:#666;font-size:12px">影院数</div></div>`;
  html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:24px;font-weight:700;color:#1a1a2e">${Object.keys(movieStats).length}</div><div style="color:#666;font-size:12px">电影数</div></div>`;
  html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:24px;font-weight:700;color:#e94560">${avgOccupancy}%</div><div style="color:#666;font-size:12px">平均上座率</div></div>`;
  html += `</div>`;

  // Cinema breakdown
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">🏢 影院明细</h3>`;
  html += `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px">`;
  html += `<tr style="background:#f0f0f5"><td style="padding:8px;font-weight:600">影院</td><td style="padding:8px;font-weight:600;text-align:right">场次</td><td style="padding:8px;font-weight:600;text-align:right">总座位</td><td style="padding:8px;font-weight:600;text-align:right">已售</td><td style="padding:8px;font-weight:600;text-align:right">上座率</td></tr>`;
  const sortedCinemas = Object.entries(cinemaStats).sort((a, b) => b[1].shows - a[1].shows);
  sortedCinemas.forEach(([name, stats], i) => {
    const occ = stats.seats > 0 ? (stats.sold / stats.seats * 100).toFixed(1) : '0.0';
    html += `<tr style="background:${i % 2 === 0 ? '#fff' : '#fafafa'}"><td style="padding:8px">${name}</td><td style="padding:8px;text-align:right">${stats.shows}</td><td style="padding:8px;text-align:right">${stats.seats || '-'}</td><td style="padding:8px;text-align:right">${stats.sold || '-'}</td><td style="padding:8px;text-align:right;color:${occ >= 50 ? '#e94560' : '#4ecca3'}">${occ}%</td></tr>`;
  });
  html += `</table>`;

  // Movie breakdown
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">🎬 电影明细</h3>`;
  html += `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px">`;
  html += `<tr style="background:#f0f0f5"><td style="padding:8px;font-weight:600">电影</td><td style="padding:8px;font-weight:600;text-align:right">场次</td><td style="padding:8px;font-weight:600;text-align:right">影厅类型</td><td style="padding:8px;font-weight:600;text-align:right">票价区间</td></tr>`;
  const sortedMovies = Object.entries(movieStats).sort((a, b) => b[1].shows - a[1].shows);
  sortedMovies.forEach(([name, stats], i) => {
    const priceRange = stats.prices.length > 0 ? `${Math.min(...stats.prices)}-${Math.max(...stats.prices)}元` : '-';
    html += `<tr style="background:${i % 2 === 0 ? '#fff' : '#fafafa'}"><td style="padding:8px">${name}</td><td style="padding:8px;text-align:right">${stats.shows}</td><td style="padding:8px;text-align:right">${[...stats.halls].join(', ')}</td><td style="padding:8px;text-align:right">${priceRange}</td></tr>`;
  });
  html += `</table>`;

  // Time distribution
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">⏰ 时段分布</h3>`;
  html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">`;
  html += `<div style="background:#fff8e1;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700">${timeStats.morning}</div><div style="color:#666;font-size:12px">早场 (12点前)</div><div style="font-size:11px;color:#999">${totalShows > 0 ? (timeStats.morning / totalShows * 100).toFixed(1) : 0}%</div></div>`;
  html += `<div style="background:#e8f5e9;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700">${timeStats.afternoon}</div><div style="color:#666;font-size:12px">下午 (12-17点)</div><div style="font-size:11px;color:#999">${totalShows > 0 ? (timeStats.afternoon / totalShows * 100).toFixed(1) : 0}%</div></div>`;
  html += `<div style="background:#ffebee;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700">${timeStats.evening}</div><div style="color:#666;font-size:12px">晚场 (17-21点)</div><div style="font-size:11px;color:#999">${totalShows > 0 ? (timeStats.evening / totalShows * 100).toFixed(1) : 0}%</div></div>`;
  html += `<div style="background:#e3f2fd;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700">${timeStats.late}</div><div style="color:#666;font-size:12px">深夜 (21点后)</div><div style="font-size:11px;color:#999">${totalShows > 0 ? (timeStats.late / totalShows * 100).toFixed(1) : 0}%</div></div>`;
  html += `</div>`;

  // Hall breakdown
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">🎦 影厅类型</h3>`;
  html += `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px">`;
  html += `<tr style="background:#f0f0f5"><td style="padding:8px;font-weight:600">影厅</td><td style="padding:8px;font-weight:600;text-align:right">场次</td><td style="padding:8px;font-weight:600;text-align:right">总座位</td><td style="padding:8px;font-weight:600;text-align:right">已售</td><td style="padding:8px;font-weight:600;text-align:right">上座率</td></tr>`;
  const sortedHalls = Object.entries(hallStats).sort((a, b) => b[1].shows - a[1].shows);
  sortedHalls.forEach(([name, stats], i) => {
    const occ = stats.seats > 0 ? (stats.sold / stats.seats * 100).toFixed(1) : '0.0';
    html += `<tr style="background:${i % 2 === 0 ? '#fff' : '#fafafa'}"><td style="padding:8px">${name}</td><td style="padding:8px;text-align:right">${stats.shows}</td><td style="padding:8px;text-align:right">${stats.seats || '-'}</td><td style="padding:8px;text-align:right">${stats.sold || '-'}</td><td style="padding:8px;text-align:right;color:${occ >= 50 ? '#e94560' : '#4ecca3'}">${occ}%</td></tr>`;
  });
  html += `</table>`;

  // Price analysis
  html += `<h3 style="margin:16px 0 8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px">💰 价格分析</h3>`;
  if (priceStats.length > 0) {
    const minPrice = Math.min(...priceStats);
    const maxPrice = Math.max(...priceStats);
    const avgPrice = (priceStats.reduce((a, b) => a + b, 0) / priceStats.length).toFixed(1);
    html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">`;
    html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:#4ecca3">¥${minPrice}</div><div style="color:#666;font-size:12px">最低票价</div></div>`;
    html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:#1a1a2e">¥${avgPrice}</div><div style="color:#666;font-size:12px">平均票价</div></div>`;
    html += `<div style="background:#f5f5f5;padding:12px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:#e94560">¥${maxPrice}</div><div style="color:#666;font-size:12px">最高票价</div></div>`;
    html += `</div>`;
  } else {
    html += `<div style="color:#999;text-align:center;padding:20px">暂无价格数据</div>`;
  }

  html += `</div>`;
  content.innerHTML = html;
}

function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('show');
}

document.getElementById('loginBtn').addEventListener('click', () => {
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('authTokenInput').value = '';
  document.getElementById('loginError').style.display = 'none';
});

document.getElementById('doLoginBtn').addEventListener('click', async () => {
  const token = document.getElementById('authTokenInput').value.trim();
  if (!token) {
    document.getElementById('loginError').textContent = '请输入 Token';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  const btn = document.getElementById('doLoginBtn');
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    const res = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const json = await res.json();
    if (json.success) {
      closeLoginModal();
      checkLoginStatus();
    } else {
      document.getElementById('loginError').textContent = json.error?.message || '登录失败';
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '确认登录';
  }
});
</script>
</body>
</html>
